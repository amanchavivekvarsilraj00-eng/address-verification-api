name: Node.js CI (Unit Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code from the repository
    - uses: actions/checkout@v4
    
    # 2. Set up the Node.js environment
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        
    # 3. Install all dependencies from package.json
    - name: Install Dependencies
      run: npm ci
      
    # 4. Run the Jest testing robots! 
    # If this fails, GitHub will show a big red X and stop the deployment.
    - name: Run Unit Tests
      run: npm test
